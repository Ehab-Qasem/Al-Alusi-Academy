
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>أكاديمية المنارة | للقدرات والتحصيلي</title>
    <script>
      // Suppress specific harmless development warnings
      const originalWarn = console.warn;
      console.warn = function(...args) {
        if (args[0] && typeof args[0] === 'string') {
          if (args[0].includes('cdn.tailwindcss.com should not be used in production')) return;
          if (args[0].includes('Duplicate extension names found')) return;
          if (args[0].includes('React Router Future Flag Warning')) return;
        }
        originalWarn.apply(console, args);
      };
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Tajawal', 'sans-serif'],
            },
            colors: {
              primary: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
                900: '#0c4a6e',
                950: '#082f49',
              },
              secondary: {
                500: '#10b981',
                600: '#059669',
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Smooth Theme Transition */
      * {
        transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
      }
      
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      .dark ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }
      
      .no-select {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }

      /* Subtle Saudi Pattern Overlay */
      .bg-pattern {
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l5.878 18.09h19.022l-15.39 11.18 5.878 18.09L30 36.18l-15.388 11.18 5.878-18.09-15.39-11.18h19.022z' fill='%230ea5e9' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
      }
      .dark .bg-pattern {
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l5.878 18.09h19.022l-15.39 11.18 5.878 18.09L30 36.18l-15.388 11.18 5.878-18.09-15.39-11.18h19.022z' fill='%2338bdf8' fill-opacity='0.02' fill-rule='evenodd'/%3E%3C/svg%3E");
      }

      /* Liquid Glass Background Blobs */
      body::before, body::after {
        content: '';
        position: fixed;
        width: 60vw;
        height: 60vw;
        border-radius: 50%;
        filter: blur(90px);
        z-index: -1;
        pointer-events: none;
        transition: opacity 0.5s ease, background 0.5s ease;
      }
      
      body::before {
        top: -10vw;
        left: -10vw;
        background: radial-gradient(circle, rgba(14,165,233,0.15) 0%, rgba(2,132,199,0) 70%);
      }
      body::after {
        bottom: -20vw;
        right: -10vw;
        background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, rgba(109,40,217,0) 70%);
      }

      .dark body::before {
        background: radial-gradient(circle, rgba(14,165,233,0.1) 0%, rgba(2,132,199,0) 70%);
      }
      .dark body::after {
        background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, rgba(109,40,217,0) 70%);
      }

      /* Global Input Fix for Light/Dark Mode Visibility */
      input, select, textarea {
        color: #1f2937 !important; /* gray-800 */
      }
      .dark input, .dark select, .dark textarea {
        color: #f3f4f6 !important; /* gray-100 */
      }
    </style>

<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-50 dark:bg-slate-950 font-sans text-gray-800 dark:text-gray-200 antialiased bg-pattern">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
